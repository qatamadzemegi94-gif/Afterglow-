<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afterglow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particles"></canvas>

    <!-- Landing Page -->
    <div id="landing">
        <div class="container">
            <h1 class="logo">AFTERGLOW</h1>
            <p class="tagline">Talk Without Judgment</p>
            <p class="subtitle">ადგილი, სადაც შეგიძლია გულწრფელად ილაპარაკო ✨</p>
            <button class="glow-btn" onclick="enterApp()">Ready?</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" style="display: none;">
        <header>
            <h2 class="logo-small">AFTERGLOW</h2>
            <nav class="nav">
                <div class="nav-item active" onclick="switchTab(0)">Home</div>
                <div class="nav-item" onclick="switchTab(1)">Feed</div>
                <div class="nav-item" onclick="switchTab(2)">My Space</div>
                <div class="nav-item" onclick="toggleMusicPanel()">🎵 Music</div>
            </nav>
        </header>

        <!-- HOME -->
        <section id="home-page" class="page active">
            <div class="content-wrapper">
                <div class="post-form">
                    <textarea id="postText" placeholder="ჩვენ გისმენთ განკიცხვის გარეშე... 💜"></textarea>
                    <button onclick="publishPost()" class="post-btn">Share Anonymously 💜</button>
                </div>
            </div>
        </section>

        <!-- FEED -->
        <section id="feed-page" class="page">
            <div class="content-wrapper">
                <div class="feed" id="feed"></div>
            </div>
        </section>

        <!-- MY SPACE -->
        <section id="space-page" class="page">
            <div class="content-wrapper">
                <h2 style="text-align:center; color:#ff8ab5; margin:60px 0;">My Space</h2>
                <p style="text-align:center; opacity:0.8;">აქ გამოჩნდება შენი პოსტები</p>
            </div>
        </section>
    </div>

    <!-- ==================== MUSIC PANEL ==================== -->
    <div class="music-panel" id="musicPanel">
        <div class="music-header">
            <h3>🎵 Afterglow Music</h3>
            <span onclick="toggleMusicPanel()" class="close-btn">✕</span>
        </div>
        
        <input type="text" id="musicSearch" placeholder="🔍 სიმღერის ძებნა..." class="music-search">

        <div id="musicList" class="music-list"></div>

        <!-- Mini Player -->
        <div class="mini-player" id="miniPlayer">
            <div class="now-playing" id="nowPlaying">აირჩიე სიმღერა...</div>
            <div class="player-controls">
                <button onclick="prevTrack()" class="player-btn">⏮</button>
                <button onclick="togglePlay()" id="mainPlayBtn" class="player-btn play-main">▶</button>
                <button onclick="nextTrack()" class="player-btn">⏭</button>
            </div>
            <input type="range" id="progressBar" class="progress-bar" value="0">
            <div class="volume-control">
                <span>🔊</span>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
