<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afterglow — შენი უსაფრთხო სივრცე</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0f0a1a] text-slate-200 min-h-screen">
    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 glass border-b border-purple-500/20">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <h1 class="text-3xl font-bold tracking-tight text-purple-300">Afterglow</h1>
            </div>
            <div class="flex gap-8 text-sm font-medium">
                <a href="#" onclick="showTab('feed')" class="hover:text-purple-300 transition-colors active-tab">Feed</a>
                <a href="#" onclick="showTab('myspace')" class="hover:text-purple-300 transition-colors">My Space</a>
            </div>
            <button onclick="toggleMusicPanel()" class="flex items-center gap-2 px-5 py-2.5 rounded-2xl glass hover:bg-purple-500/20 transition-all">
                <i class="fas fa-music"></i> მუსიკა
            </button>
        </div>
    </nav>

    <div class="pt-24 pb-12 max-w-7xl mx-auto px-6">
        <!-- Hero -->
        <div class="text-center mb-16">
            <h1 class="text-5xl md:text-6xl font-semibold mb-4 text-purple-200">ჩვენ გისმენთ</h1>
            <p class="text-2xl text-slate-400 mb-8">შენ არ ხარ მარტო</p>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-4xl mx-auto">
                <div class="glass p-6 rounded-3xl text-center hover:scale-105 transition-transform">
                    <p class="text-purple-300">"ყოველი დღე ახალი დასაწყისია ✨"</p>
                </div>
                <div class="glass p-6 rounded-3xl text-center hover:scale-105 transition-transform">
                    <p class="text-purple-300">"შენი ისტორია მნიშვნელოვანია 💜"</p>
                </div>
                <div class="glass p-6 rounded-3xl text-center hover:scale-105 transition-transform">
                    <p class="text-purple-300">"შენ იმაზე ძლიერი ხარ ვიდრე გგონია 🌙"</p>
                </div>
                <div class="glass p-6 rounded-3xl text-center hover:scale-105 transition-transform">
                    <p class="text-purple-300">"დღესაც შეგიძლია გაიღიმო ⭐"</p>
                </div>
            </div>
        </div>

        <!-- Post Form -->
        <div class="glass rounded-3xl p-8 mb-12">
            <textarea id="post-input" rows="4" 
                class="w-full bg-[#1a1433] border border-purple-500/30 rounded-2xl p-6 text-lg placeholder-slate-400 focus:outline-none focus:border-purple-400 resize-none"
                placeholder="რა გაწუხებს დღეს? რისი თქმა გინდა, მაგრამ ვერავის ეუბნები..."></textarea>
            <div class="flex justify-end mt-4">
                <button onclick="publishPost()" 
                    class="px-8 py-3 bg-gradient-to-r from-purple-500 to-pink-500 rounded-2xl font-medium hover:scale-105 transition-all">
                    გაზიარება ანონიმურად
                </button>
            </div>
        </div>

        <!-- Feed -->
        <div id="feed-tab">
            <h2 class="text-2xl font-semibold mb-6">Community Feed</h2>
            <div id="feed" class="space-y-8"></div>
        </div>

        <!-- My Space -->
        <div id="myspace-tab" class="hidden">
            <h2 class="text-2xl font-semibold mb-6">ჩემი სივრცე</h2>
            <div id="my-posts" class="space-y-6"></div>
        </div>
    </div>

    <!-- Music Panel -->
    <div id="music-panel" class="fixed right-0 top-0 h-full w-96 glass border-l border-purple-500/30 translate-x-full transition-all duration-300 z-[100] flex flex-col">
        <div class="p-6 border-b border-purple-500/20">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-medium flex items-center gap-2">
                    <i class="fas fa-music text-purple-400"></i> ღამის მეგობარი
                </h3>
                <button onclick="toggleMusicPanel()" class="text-2xl text-slate-400 hover:text-white">✕</button>
            </div>
        </div>

        <!-- Now Playing -->
        <div class="p-6 border-b border-purple-500/20">
            <div class="w-52 h-52 mx-auto rounded-3xl overflow-hidden mb-6 shadow-2xl">
                <iframe id="youtube-player" width="100%" height="100%" frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <p id="current-title" class="font-semibold text-center text-lg">აირჩიე სიმღერა</p>
            <p id="current-artist" class="text-center text-slate-400 text-sm">Afterglow Playlist</p>
        </div>

        <!-- Controls -->
        <div class="flex justify-center gap-8 py-6">
            <button onclick="prevTrack()" class="text-3xl text-slate-400 hover:text-white"><i class="fas fa-backward"></i></button>
            <button onclick="togglePlay()" id="play-pause-btn" class="text-5xl text-purple-300"><i class="fas fa-play"></i></button>
            <button onclick="nextTrack()" class="text-3xl text-slate-400 hover:text-white"><i class="fas fa-forward"></i></button>
        </div>

        <!-- Playlist -->
        <div class="flex-1 overflow-y-auto px-6 pb-6">
            <h4 class="uppercase text-xs tracking-widest text-slate-400 mb-4">Playlist</h4>
            <div id="playlist" class="space-y-2"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
