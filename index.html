<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afterglow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Particles Background -->
    <canvas id="particles"></canvas>

    <!-- Landing Page -->
    <div id="landing">
        <div class="container">
            <h1 class="logo">AFTERGLOW</h1>
            <p class="tagline">Talk Without Judgment</p>
            <p class="subtitle">ადგილი, სადაც შეგიძლია გულწრფელად ილაპარაკო ✨</p>
            <button class="glow-btn" onclick="enterApp()">Ready?</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="app">
        <header>
            <h2>Afterglow</h2>
            <div class="nav">
                <div class="nav-item active">Home</div>
                <div class="nav-item">Feed</div>
                <div class="nav-item">My Space</div>
            </div>
        </header>

        <!-- Mood Selector -->
        <div class="mood-selector">
            <div class="mood-option" data-mood="hopeful" onclick="setMood(this)">🌈</div>
            <div class="mood-option" data-mood="sad" onclick="setMood(this)">😔</div>
            <div class="mood-option" data-mood="angry" onclick="setMood(this)">😡</div>
            <div class="mood-option" data-mood="overwhelmed" onclick="setMood(this)">😭</div>
            <div class="mood-option" data-mood="calm" onclick="setMood(this)">🌙</div>
        </div>

        <!-- Daily Quote -->
        <div class="quote-section">
            <p id="dailyQuote">"ჩვენ გისმენთ. შენ არ ხარ მარტო."</p>
        </div>

        <!-- Post Form -->
        <div class="post-form">
            <textarea id="postText" placeholder="ჩვენ გისმენთ განკიცხვის გარეშე. შეგიძლია მოგვიყვე ყველაფერი... 💜"></textarea>
            <div class="post-actions">
                <button onclick="publishPost()" class="post-btn">Share Anonymously 💜</button>
                <span class="anonymous-label">Anonymous • Moon</span>
            </div>
        </div>

        <!-- Feed -->
        <div class="feed" id="feed"></div>
    </div>

    <!-- Floating Music Button -->
    <div class="music-float-btn" onclick="toggleMusicPanel()">
        ♫
    </div>

    <!-- Music Panel -->
    <div class="music-panel" id="musicPanel">
        <div class="music-header">
            <h3>🎵 Lofi Vibes for You</h3>
            <span onclick="toggleMusicPanel()" class="close-btn">✕</span>
        </div>
        <div id="musicList"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
