<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afterglow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particles"></canvas>

    <!-- Landing -->
    <div id="landing">
        <div class="container">
            <h1 class="logo">AFTERGLOW</h1>
            <p class="tagline">Talk Without Judgment</p>
            <p class="subtitle">ადგილი, სადაც შეგიძლია გულწრფელად ილაპარაკო ✨</p>
            <button class="glow-btn" onclick="enterApp()">Ready?</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="app">
        <header>
            <h2 class="logo-small">AFTERGLOW</h2>
            <nav class="nav">
                <div class="nav-item active" onclick="switchTab(0)">Home</div>
                <div class="nav-item" onclick="switchTab(1)">Feed</div>
                <div class="nav-item" onclick="switchTab(2)">My Space</div>
            </nav>
        </header>

        <!-- HOME -->
        <section id="home-page" class="page active">
            <div class="content-wrapper">
                <!-- Motivational Slider -->
                <div class="motivational-slider" id="motivationalSlider">
                    <p id="motivationalText">"შენს გრძნობებს მნიშვნელობა აქვს."</p>
                </div>

                <div class="post-form">
                    <textarea id="postText" placeholder="ჩვენ გისმენთ განკიცხვის გარეშე... 💜"></textarea>
                    <div class="post-actions">
                        <button onclick="toggleEmojiPicker()" class="emoji-btn">😀</button>
                        <button onclick="publishPost()" class="post-btn">Share Anonymously 💜</button>
                    </div>
                </div>

                <!-- Emoji Picker -->
                <div id="emojiPicker" class="emoji-picker">
                    <span onclick="addEmojiToPost(this)">😊</span>
                    <span onclick="addEmojiToPost(this)">❤️</span>
                    <span onclick="addEmojiToPost(this)">😢</span>
                    <span onclick="addEmojiToPost(this)">😡</span>
                    <span onclick="addEmojiToPost(this)">🌈</span>
                    <span onclick="addEmojiToPost(this)">🫂</span>
                    <span onclick="addEmojiToPost(this)">✨</span>
                </div>
            </div>
        </section>

        <!-- FEED -->
        <section id="feed-page" class="page">
            <div class="content-wrapper">
                <div class="feed" id="feed"></div>
            </div>
        </section>

        <!-- MY SPACE -->
        <section id="space-page" class="page">
            <div class="content-wrapper">
                <h2 style="text-align:center; color:#ff8ab5; margin:40px 0;">My Space</h2>
                <div class="feed" id="my-posts"></div>
            </div>
        </section>
    </div>

    <!-- Music -->
    <div class="music-float-btn" onclick="toggleMusicPanel()">♫</div>
    <div class="music-panel" id="musicPanel">
        <div class="music-header">
            <h3>🎵 Afterglow Playlist</h3>
            <span onclick="toggleMusicPanel()" class="close-btn">✕</span>
        </div>
        <div id="musicList" class="music-list"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
